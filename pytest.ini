[pytest]
# asyncio_mode = auto: every async test function is automatically treated as
# an asyncio coroutine. Without this, you'd need to add @pytest.mark.asyncio
# decorator to EVERY async test — very tedious.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# testpaths: pytest only looks in the tests/ directory, not the whole project.
# This prevents it from accidentally picking up non-test files.
testpaths = tests

# -v: verbose output (show each test name)
# -s: don't capture stdout (useful for seeing print() in tests)
addopts = -v

# Suppress SQLAlchemy INFO logs during tests — keeps output clean
log_cli = false
